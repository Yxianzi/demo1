dataset: houston
source_data: ./datasets/Houston/Houston13.mat
source_label: ./datasets/Houston/Houston13_7gt.mat
target_data: ./datasets/Houston/Houston18.mat
target_label: ./datasets/Houston/Houston18_7gt.mat

num_classes: 7
n_band: 48
half_width: 3
patch_size: 7

epochs: 100
batch_size: 32
lr: 0.01
momentum: 0.9
weight_decay: 0.0005
ema_decay: 0.999
warmup_epochs: 10
eval_interval: 10
n_datasets: 3

num_tokens: 4
token_dim: 64
transformer_depth: 2
num_heads: 4
adapter_bottleneck: 64
proto_temperature: 0.1
proto_logit_weight: 0.5
prototype_eta: 0.7

lambda_lmmd: 0.01
lambda_mcc: 0.10
lambda_pseudo: 0.30
lambda_proto: 0.10
lambda_sp_pred: 0.10
lambda_sp_feat: 0.02
lambda_cons: 0.05

pseudo_threshold_start: 0.85
pseudo_threshold_end: 0.65
topk_per_class: 4

spatial_k: 6
sigma_spatial: 2.5
sigma_spectral: 1.0
spatial_vote_alpha: 0.35
