dataset: houston
source_data: ./datasets/Houston/Houston13.mat
source_label: ./datasets/Houston/Houston13_7gt.mat
target_data: ./datasets/Houston/Houston18.mat
target_label: ./datasets/Houston/Houston18_7gt.mat

num_classes: 7
n_band: 48
half_width: 3
patch_size: 7

epochs: 100
batch_size: 32
lr: 0.01
momentum: 0.9
weight_decay: 0.0005
ema_decay: 0.999
warmup_epochs: 10
eval_interval: 10
n_datasets: 3
use_reliability_eval: true
pseudo_warmup_epochs: 15
target_proto_warmup_epochs: 20
proto_head_warmup_epochs: 10

num_tokens: 8
token_dim: 128
transformer_depth: 3
num_heads: 4
adapter_bottleneck: 64
proto_temperature: 0.1
proto_logit_weight: 0.5
proto_count_tau: 20
min_proto_update_per_class: 3

lambda_lmmd: 0.01
lambda_mcc: 0.10
lambda_pseudo: 0.10
lambda_proto: 0.05
lambda_sp_pred: 0.05
lambda_sp_feat: 0.01
lambda_cons: 0.02
lambda_div: 0.01

pseudo_threshold_start: 0.60
pseudo_threshold_end: 0.70
topk_per_class: 4

spatial_k: 6
sigma_spatial: 2.5
sigma_spectral: 1.0
spatial_vote_alpha: 0.35
reliability_map_sigma: 1.0
